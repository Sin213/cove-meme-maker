name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (no leading v)'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          else
            v="${{ github.event.inputs.version }}"
            [ -z "$v" ] && v="0.0.0-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils tar xz-utils curl libfuse2

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 Pillow pyinstaller

      - name: Run Linux build script
        run: |
          chmod +x scripts/build-release.sh
          bash scripts/build-release.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: release/*.AppImage
          if-no-files-found: error

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb
          if-no-files-found: error

      - name: Generate SHA256 sidecars
        run: |
          cd release
          for f in *.AppImage *.deb; do
            [ -e "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
          done
          ls -lh

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.AppImage.sha256
            release/*.deb
            release/*.deb.sha256
          body_path: .github/RELEASE_NOTES_v${{ needs.resolve-version.outputs.version }}.md
          fail_on_unmatched_files: true

  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Windows build script
        shell: pwsh
        run: .\build.ps1 -Version $env:VERSION

      - name: Upload Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: release/*-Setup.exe
          if-no-files-found: error

      - name: Upload Portable exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*-Portable.exe
          if-no-files-found: error

      - name: Generate SHA256 sidecars
        shell: pwsh
        run: |
          Set-Location release
          Get-ChildItem -File -Include *-Setup.exe,*-Portable.exe | ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File -FilePath "$($_.Name).sha256" -Encoding ascii -NoNewline
              Add-Content -Path "$($_.Name).sha256" -Value ""
          }
          Get-ChildItem | Format-Table Name, Length

      - name: Attach to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*-Setup.exe
            release/*-Setup.exe.sha256
            release/*-Portable.exe
            release/*-Portable.exe.sha256
          body_path: .github/RELEASE_NOTES_v${{ needs.resolve-version.outputs.version }}.md
          fail_on_unmatched_files: true
